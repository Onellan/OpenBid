name: release-images

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true
      - name: Run tests
        run: go test ./...

  publish:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set build metadata
        id: build_metadata
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: app_meta
        with:
          images: ghcr.io/onellan/openbid/app
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
      - uses: docker/metadata-action@v5
        id: extractor_meta
        with:
          images: ghcr.io/onellan/openbid/extractor
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ProductionDeployment/Dockerfile.app
          push: true
          tags: ${{ steps.app_meta.outputs.tags }}
          labels: ${{ steps.app_meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build_metadata.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push extractor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ProductionDeployment/Dockerfile.extractor
          push: true
          tags: ${{ steps.extractor_meta.outputs.tags }}
          labels: ${{ steps.extractor_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
