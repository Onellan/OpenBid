name: release-images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Run tests
        run: go test ./...

  publish:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: app_meta
        with:
          images: ghcr.io/${{ github.repository }}/app
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag
            type=sha
      - uses: docker/metadata-action@v5
        id: extractor_meta
        with:
          images: ghcr.io/${{ github.repository }}/extractor
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag
            type=sha
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ${{ steps.app_meta.outputs.tags }}
          labels: ${{ steps.app_meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push extractor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.extractor
          push: true
          tags: ${{ steps.extractor_meta.outputs.tags }}
          labels: ${{ steps.extractor_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
