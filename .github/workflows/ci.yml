name: ci

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker_app: ${{ steps.filter.outputs.docker_app }}
      docker_extractor: ${{ steps.filter.outputs.docker_extractor }}
      compose_stack: ${{ steps.filter.outputs.compose_stack }}
      browser_e2e: ${{ steps.filter.outputs.browser_e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker_app:
              - 'ProductionDeployment/Dockerfile.app'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'
              - 'web/**'
            docker_extractor:
              - 'ProductionDeployment/Dockerfile.extractor'
              - 'extractor/**'
            compose_stack:
              - 'ProductionDeployment/docker-compose.yml'
              - 'ProductionDeployment/docker-compose.ghcr.yml'
              - 'ProductionDeployment/nginx/**'
              - '.github/workflows/ci.yml'
            browser_e2e:
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.js'
              - 'e2e/**'
              - 'cmd/e2e_seed/**'

  verify:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: Run tests
        run: go test ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Go vulnerability check
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [changes, verify]
    timeout-minutes: 15
    if: needs.changes.outputs.docker_app == 'true' || needs.changes.outputs.docker_extractor == 'true' || needs.changes.outputs.compose_stack == 'true' || needs.changes.outputs.browser_e2e == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Prepare runtime directories
        run: cd ProductionDeployment && sh ./setup.sh
      - name: Boot compose stack
        run: APP_ENV=development SECURE_COOKIES=false docker compose -f ProductionDeployment/docker-compose.yml up --build -d
      - name: Wait for healthz
        run: |
          echo "Waiting for app healthz endpoint..."
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8088/healthz; then
              echo "App healthz endpoint ready after $((attempt * 5)) seconds"
              exit 0
            fi
            echo "Attempt $attempt: healthz not ready, waiting..."
            sleep 5
          done
          echo "healthz did not become ready in time (150s timeout exceeded)" >&2
          exit 1
      - name: Diagnose compose stack on healthz timeout
        if: failure()
        run: |
          echo "=== Docker Compose Status ==="
          docker compose -f ProductionDeployment/docker-compose.yml ps
          echo ""
          echo "=== App Container Logs (last 100 lines) ==="
          docker compose -f ProductionDeployment/docker-compose.yml logs --tail=100 app
          echo ""
          echo "=== Extractor Container Logs (last 50 lines) ==="
          docker compose -f ProductionDeployment/docker-compose.yml logs --tail=50 extractor
          echo ""
          echo "=== Proxy Container Logs (last 50 lines) ==="
          docker compose -f ProductionDeployment/docker-compose.yml logs --tail=50 proxy
          echo ""
          echo "=== Container Health Status ==="
          docker inspect openbid-app-1 --format '{{json .State.Health}}' 2>/dev/null | jq . || docker inspect openbid-app-1 --format '{{json .State.Health}}'
          exit 1
      - name: Seed deterministic E2E data
        run: DATA_PATH=ProductionDeployment/runtime/data/store.db go run ./cmd/e2e_seed
      - name: Install browser test dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run browser E2E coverage
        run: npm run test:e2e
      - name: Show compose status on failure
        if: failure()
        run: |
          docker compose -f ProductionDeployment/docker-compose.yml ps
          docker compose -f ProductionDeployment/docker-compose.yml logs --tail=200
      - name: Tear down compose stack
        if: always()
        run: docker compose -f ProductionDeployment/docker-compose.yml down -v --remove-orphans
