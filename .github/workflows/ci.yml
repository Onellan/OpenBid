name: ci

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker_app: ${{ steps.filter.outputs.docker_app }}
      docker_extractor: ${{ steps.filter.outputs.docker_extractor }}
      compose_stack: ${{ steps.filter.outputs.compose_stack }}
      browser_e2e: ${{ steps.filter.outputs.browser_e2e }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker_app:
              - 'ProductionDeployment/Dockerfile.app'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'
              - 'web/**'
            docker_extractor:
              - 'ProductionDeployment/Dockerfile.extractor'
              - 'extractor/**'
            compose_stack:
              - 'ProductionDeployment/docker-compose.yml'
              - 'ProductionDeployment/docker-compose.ghcr.yml'
              - 'ProductionDeployment/nginx/**'
              - '.github/workflows/ci.yml'
            browser_e2e:
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.js'
              - 'e2e/**'
              - 'cmd/e2e_seed/**'

  verify:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true
      - name: Run tests
        run: go test ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Go vulnerability check
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [changes, verify]
    timeout-minutes: 15
    if: needs.changes.outputs.docker_app == 'true' || needs.changes.outputs.docker_extractor == 'true' || needs.changes.outputs.compose_stack == 'true' || needs.changes.outputs.browser_e2e == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Prepare runtime directories
        run: cd ProductionDeployment && sh ./setup.sh
      - name: Boot compose stack
        env:
          APP_ENV: development
          SECURE_COOKIES: "false"
          # checkov:skip=CKV_SECRET_6: Test secret for ephemeral CI smoke test environment
          SECRET_KEY: ci-smoke-secret-change-me-2026
          SECRET_KEY_FILE: ""
          BOOTSTRAP_ADMIN_PASSWORD: OpenBid!2026-SmokeTest123
          BOOTSTRAP_ADMIN_PASSWORD_FILE: ""
        run: |
          # CI uses env-based secrets because setup.sh creates 600 bind-mounted secret files,
          # which are not readable by the non-root app user; this is acceptable for ephemeral smoke tests.
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml config --quiet
          resolved_config="$(docker compose --ansi never -f ProductionDeployment/docker-compose.yml config)"
          printf '%s\n' "$resolved_config" | grep -q 'SECRET_KEY_FILE: ""'
          printf '%s\n' "$resolved_config" | grep -q 'BOOTSTRAP_ADMIN_PASSWORD_FILE: ""'
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml up --build -d
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml ps
      - name: Wait for healthz
        run: |
          echo "Waiting for app healthz endpoint..."
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8088/healthz; then
              echo "App healthz endpoint ready after $((attempt * 5)) seconds"
              exit 0
            fi
            echo "Attempt $attempt: healthz not ready, waiting..."
            sleep 5
          done
          echo "healthz did not become ready in time (150s timeout exceeded)" >&2
          exit 1
      - name: Diagnose compose stack failure
        if: failure()
        env:
          APP_ENV: development
          SECURE_COOKIES: "false"
          SECRET_KEY: ci-smoke-secret-change-me-2026
          SECRET_KEY_FILE: ""
          BOOTSTRAP_ADMIN_PASSWORD: OpenBid!2026-SmokeTest123
          BOOTSTRAP_ADMIN_PASSWORD_FILE: ""
        run: |
          echo "=== Docker Compose Status ==="
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml ps || true
          echo ""
          echo "=== Docker Compose Resolved Config (secrets redacted) ==="
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml config | sed -E 's/(SECRET_KEY|BOOTSTRAP_ADMIN_PASSWORD): .*/\1: <redacted>/g; s/(SECRET_KEY_FILE|BOOTSTRAP_ADMIN_PASSWORD_FILE): .*/\1: <redacted>/g' || true
          echo ""
          echo "=== App Container Logs (last 150 lines) ==="
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml logs --tail=150 app || true
          echo ""
          echo "=== Worker Container Logs (last 100 lines) ==="
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml logs --tail=100 worker || true
          echo ""
          echo "=== Extractor Container Logs (last 100 lines) ==="
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml logs --tail=100 extractor || true
          echo ""
          echo "=== Proxy Container Logs (last 100 lines) ==="
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml logs --tail=100 proxy || true
          echo ""
          echo "=== Container Health Status ==="
          for container in openbid-app-1 openbid-worker-1 openbid-extractor-1 openbid-proxy-1; do
            echo "--- ${container} ---"
            docker inspect "${container}" --format '{{json .State.Health}}' 2>/dev/null | jq . || true
          done
      - name: Seed deterministic E2E data
        run: DATA_PATH=ProductionDeployment/runtime/data/store.db go run ./cmd/e2e_seed
      - name: Install browser test dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run browser E2E coverage
        run: npm run test:e2e:ci
      - name: Show compose status on failure
        if: failure()
        run: |
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml ps || true
          docker compose --ansi never -f ProductionDeployment/docker-compose.yml logs --tail=200 || true
      - name: Tear down compose stack
        if: always()
        run: docker compose --ansi never -f ProductionDeployment/docker-compose.yml down -v --remove-orphans
