name: openbid

services:
  app:
    image: ${APP_IMAGE_REF:-ghcr.io/onellan/openbid/app:${APP_IMAGE_TAG:-latest}}
    pull_policy: always
    init: true
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_ADDR: ":8080"
      DATA_PATH: "/app/data/store.db"
      SECRET_KEY: "${SECRET_KEY:-}"
      SECRET_KEY_FILE: "${SECRET_KEY_FILE:-/run/secrets/openbid_secret_key}"
      SECURE_COOKIES: "${SECURE_COOKIES:-true}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      BOOTSTRAP_ADMIN_PASSWORD_FILE: "${BOOTSTRAP_ADMIN_PASSWORD_FILE:-/run/secrets/openbid_bootstrap_admin_password}"
      BOOTSTRAP_SYNC_ON_STARTUP: "${BOOTSTRAP_SYNC_ON_STARTUP:-false}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
      BACKUP_DIR: "/app/backups"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-600}"
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-10}"
    volumes:
      - "./runtime/data:/app/data"
      - "./runtime/backups:/app/backups"
    secrets:
      - openbid_secret_key
      - openbid_bootstrap_admin_password
    tmpfs:
      - "/tmp"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - "ALL"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      extractor:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 20s

  worker:
    image: ${APP_IMAGE_REF:-ghcr.io/onellan/openbid/app:${APP_IMAGE_TAG:-latest}}
    pull_policy: always
    init: true
    command: ["openbid-worker"]
    environment:
      APP_ENV: "${APP_ENV:-production}"
      DATA_PATH: "/app/data/store.db"
      SECRET_KEY: "${SECRET_KEY:-}"
      SECRET_KEY_FILE: "${SECRET_KEY_FILE:-/run/secrets/openbid_secret_key}"
      SECURE_COOKIES: "${SECURE_COOKIES:-true}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      BOOTSTRAP_ADMIN_PASSWORD_FILE: "${BOOTSTRAP_ADMIN_PASSWORD_FILE:-/run/secrets/openbid_bootstrap_admin_password}"
      BOOTSTRAP_SYNC_ON_STARTUP: "${BOOTSTRAP_SYNC_ON_STARTUP:-false}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
      WORKER_SYNC_MINUTES: "${WORKER_SYNC_MINUTES:-360}"
      WORKER_LOOP_SECONDS: "${WORKER_LOOP_SECONDS:-30}"
      BACKUP_DIR: "/app/backups"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-600}"
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-10}"
    volumes:
      - "./runtime/data:/app/data"
      - "./runtime/backups:/app/backups"
    secrets:
      - openbid_secret_key
      - openbid_bootstrap_admin_password
    tmpfs:
      - "/tmp"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - "ALL"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      extractor:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "openbid-worker-health", "/tmp/openbid-worker-heartbeat", "180"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s

  extractor:
    image: ${EXTRACTOR_IMAGE_REF:-ghcr.io/onellan/openbid/extractor:${EXTRACTOR_IMAGE_TAG:-latest}}
    pull_policy: always
    init: true
    tmpfs:
      - "/tmp"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - "ALL"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:9090/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 20s

  proxy:
    image: nginx:1.27-alpine
    init: true
    ports:
      - "${OPENBID_HTTP_PORT:-8088}:80"
    volumes:
      - "./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    tmpfs:
      - "/var/cache/nginx"
      - "/var/run"
      - "/tmp"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - "ALL"
    cap_add:
      - "CHOWN"
      - "SETGID"
      - "SETUID"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 15s

secrets:
  openbid_secret_key:
    file: ./runtime/secrets/openbid_secret_key
  openbid_bootstrap_admin_password:
    file: ./runtime/secrets/openbid_bootstrap_admin_password
