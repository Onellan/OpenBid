map $http_x_forwarded_proto $forwarded_proto {
  default "";
  "~*^https$" https;
  "~*^http$" http;
}

map $http_cf_visitor $cloudflare_proto {
  default "";
  "~*\"scheme\":\"https\"" https;
  "~*\"scheme\":\"http\"" http;
}

map "$forwarded_proto:$cloudflare_proto" $proxy_forwarded_proto {
  default $scheme;
  "~*^https:" https;
  "~*^http:" http;
  "~*^:https$" https;
  "~*^:http$" http;
}

limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=60r/m;
log_format structured '$remote_addr request_id=$request_id forwarded_for="$http_x_forwarded_for" '
                      'method=$request_method path="$uri" query="$args" status=$status bytes=$body_bytes_sent '
                      'request_time=$request_time upstream_time=$upstream_response_time upstream_addr="$upstream_addr"';

server {
  listen 80;
  server_name _;
  server_tokens off;
  client_max_body_size 10m;
  client_body_timeout 15s;
  send_timeout 30s;
  resolver 127.0.0.11 ipv6=off valid=30s;
  resolver_timeout 5s;
  limit_req_status 429;
  access_log /dev/stdout structured;
  error_log /dev/stderr warn;

  proxy_http_version 1.1;
  proxy_set_header Host $http_host;
  proxy_set_header X-Forwarded-Host $http_host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
  proxy_set_header CF-Visitor $http_cf_visitor;
  proxy_set_header X-Request-Id $request_id;
  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
  add_header X-Request-Id $request_id always;

  location /login {
    limit_req zone=login burst=10 nodelay;
    set $app_upstream app:8080;
    proxy_pass http://$app_upstream;
  }

  location /assets/ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    set $app_upstream app:8080;
    proxy_pass http://$app_upstream;
  }

  location / {
    limit_req zone=general burst=60 nodelay;
    set $app_upstream app:8080;
    proxy_pass http://$app_upstream;
  }
}
