{{define "base"}}<!doctype html><html lang="en"><head><meta charset="utf-8"><title>{{.Title}} · OpenBid</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>
:root{
  --color-primary:#0F4C81;
  --color-primary-strong:#0C3F6B;
  --color-primary-soft:#EAF2F9;
  --color-secondary:#1F6FB2;
  --color-accent:#12B3A8;
  --color-bg:#F5F8FB;
  --color-surface:#FFFFFF;
  --color-surface-soft:#F8FBFD;
  --color-text:#1E293B;
  --color-text-muted:#64748B;
  --color-border:#D9E2EC;
  --color-success:#0F9D8A;
  --color-warning:#D98E04;
  --color-danger:#D64545;
  --color-info:#2F80ED;
  --radius-card:18px;
  --radius-control:12px;
  --radius-badge:999px;
  --shadow-soft:0 12px 32px rgba(15,76,129,0.08);
  --shadow-strong:0 18px 40px rgba(15,76,129,0.12);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--color-bg);color:var(--color-text);line-height:1.5}
a{text-decoration:none;color:inherit}
header{background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:20}
main{padding-bottom:32px}
.shell{max-width:1280px;margin:0 auto;padding:20px}
.topbar{display:flex;justify-content:space-between;gap:20px;align-items:center;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo-mark{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--color-primary),var(--color-secondary));display:grid;place-items:center;box-shadow:var(--shadow-soft)}
.logo-mark span{display:block;width:20px;height:20px;border:3px solid #fff;border-right-color:#9CEAE3;border-bottom-color:#9CEAE3;border-radius:999px;transform:rotate(-18deg)}
.brand-wordmark{display:flex;align-items:baseline;gap:4px}
.brand-wordmark .open{font-weight:600;color:var(--color-text)}
.brand-wordmark .bid{font-weight:800;color:var(--color-primary)}
.brand-tag{font-size:12px;color:var(--color-text-muted)}
nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
nav a{padding:10px 12px;border-radius:10px;color:var(--color-text-muted);font-weight:600}
nav a:hover{background:var(--color-primary-soft);color:var(--color-primary)}
.tenant-switch{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grid{display:grid;gap:18px}
.stack{display:grid;gap:18px}
.split{display:grid;grid-template-columns:1.35fr 1fr;gap:18px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.kpi-band{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px}
.row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.form-grid{display:grid;gap:14px}
.table-wrap{overflow:auto}
.card{background:var(--color-surface);border:1px solid rgba(15,76,129,0.08);border-radius:var(--radius-card);padding:20px;box-shadow:var(--shadow-soft)}
.card-soft{background:var(--color-surface-soft);border:1px solid var(--color-border);border-radius:16px;padding:16px}
.page-hero{background:linear-gradient(135deg,#ffffff 0%,#f6fbff 60%,#eef9f8 100%);border:1px solid rgba(15,76,129,0.08);border-radius:24px;padding:28px;box-shadow:var(--shadow-soft)}
.page-eyebrow{display:inline-flex;align-items:center;padding:6px 10px;border-radius:var(--radius-badge);font-size:12px;font-weight:700;background:#EAF2FF;color:var(--color-info)}
.page-title,.section-title{margin:0;letter-spacing:-0.02em}
.page-title{font-size:42px;line-height:1.08;margin-top:12px;max-width:900px}
.section-title{font-size:28px;line-height:1.15}
.page-copy{font-size:18px;color:var(--color-text-muted);max-width:840px;margin:12px 0 0 0}
.card-title{margin:0;font-size:24px;line-height:1.2;letter-spacing:-0.02em}
.card-subtitle{margin:6px 0 0 0;color:var(--color-text-muted);font-size:14px}
.metric{font-size:34px;font-weight:800;letter-spacing:-0.02em;color:var(--color-primary)}
.metric-label{font-size:13px;color:var(--color-text-muted);font-weight:700;text-transform:none}
.metric-card{min-height:116px;display:flex;flex-direction:column;justify-content:space-between}
.muted{color:var(--color-text-muted)}
.small{font-size:13px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.footer-note{font-size:13px;color:var(--color-text-muted)}
.badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:var(--radius-badge);font-size:12px;font-weight:700;background:var(--color-primary-soft);color:var(--color-primary)}
.badge.success{background:#E8FBF8;color:var(--color-success)}
.badge.warning{background:#FFF5DF;color:var(--color-warning)}
.badge.danger{background:#FDEAEA;color:var(--color-danger)}
.badge.info{background:#EAF2FF;color:var(--color-info)}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.toolbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
.list{display:grid;gap:12px}
.empty-state{padding:24px;border:1px dashed var(--color-border);border-radius:16px;background:var(--color-surface-soft);color:var(--color-text-muted);text-align:center}.notice{padding:12px 14px;border-radius:12px;border:1px solid var(--color-border);background:var(--color-surface-soft)}
input,select,textarea,button{width:100%;padding:12px 14px;border:1px solid var(--color-border);border-radius:var(--radius-control);background:#fff;color:var(--color-text);font:inherit}
textarea{min-height:110px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--color-secondary);box-shadow:0 0 0 4px rgba(31,111,178,0.12)}
label{display:grid;gap:8px;font-size:14px;font-weight:600;color:var(--color-text)}
button,.button{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:auto;padding:12px 16px;border:none;border-radius:12px;background:var(--color-primary);color:#fff;font-weight:700;box-shadow:var(--shadow-soft);cursor:pointer}
button:hover,.button:hover{background:var(--color-primary-strong)}
.button.secondary{background:#fff;color:var(--color-secondary);border:1px solid var(--color-secondary);box-shadow:none}
table{width:100%;border-collapse:collapse}
th,td{padding:14px 12px;border-bottom:1px solid var(--color-border);text-align:left;vertical-align:top}
th{font-size:13px;color:var(--color-text-muted);font-weight:700;background:#FBFDFF}
tr:hover td{background:#FCFEFF}
hr{border:none;border-top:1px solid var(--color-border);margin:18px 0}
@media (max-width:1100px){.split{grid-template-columns:1fr}.row-4{grid-template-columns:1fr 1fr}}
@media (max-width:700px){.row-4{grid-template-columns:1fr}.shell{padding:16px}.page-title{font-size:32px}.section-title{font-size:24px}.card-title{font-size:22px}}
</style></head><body><header><div class="shell"><div class="topbar"><div class="brand"><div class="logo-mark" aria-hidden="true"><span></span></div><div><div class="brand-wordmark"><span class="open">Open</span><span class="bid">Bid</span></div><div class="brand-tag">Open opportunities. Better bidding.</div></div></div>{{if .User}}<div class="tenant-switch"><nav><a href="/dashboard">Dashboard</a><a href="/tenders">Opportunities</a><a href="/queue">Pipeline</a><a href="/saved-searches">Saved Searches</a><a href="/audit-log">Audit Log</a><a href="/password">Password</a><a href="/mfa">MFA</a><a href="/admin/users">Users</a><a href="/admin/tenants">Tenants</a><a href="/admin/sources">Sources</a><a href="/logout">Logout</a></nav><form method="post" action="/tenant/switch" style="display:flex;gap:8px;align-items:center"><input type="hidden" name="csrf_token" value="{{.CSRFToken}}"><input type="hidden" name="return_to" value="/dashboard"><select name="tenant_id">{{range .UserTenants}}<option value="{{.Tenant.ID}}" {{if eq $.Tenant.ID .Tenant.ID}}selected{{end}}>{{.Tenant.Name}} · {{.Role}}</option>{{end}}</select><button type="submit">Switch</button></form></div>{{end}}</div></div></header><main class="shell">{{template "content" .}}
</main>
<script>
document.addEventListener('submit', function(e){
  const form = e.target;
  if (!(form instanceof HTMLFormElement)) return;
  const message = form.getAttribute('data-confirm');
  if (message && !window.confirm(message)) {
    e.preventDefault();
  }
});
</script>
</body></html>{{end}}
