{{define "password.html"}}{{template "base" .}}{{end}}{{define "content"}}
<section class="card" style="max-width:760px">
  {{template "card_header" (dict "title" "Update your password" "subtitle" "Keep your OpenBid account secure with a strong, current password.")}}
  <div style="margin-top:10px">{{template "flash_messages" .}}</div>
  <form method="post" action="/password" class="form-grid" style="margin-top:14px">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label>Current password<input type="password" name="current_password" required></label>
    <label>New password<input type="password" name="new_password" required></label>
    <label>Confirm new password<input type="password" name="confirm_password" required></label>
    <div class="actions"><button type="submit">Update password</button></div>
  </form>
</section>
{{end}}
