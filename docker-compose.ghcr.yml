version: "3.9"
services:
  app:
    image: ghcr.io/OWNER/REPO/app:latest
    environment:
      APP_ADDR: ":8080"
      DATA_PATH: "/app/data/store.json"
      SECRET_KEY: "${SECRET_KEY}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
    volumes: ["./data:/app/data"]
    restart: unless-stopped

  worker:
    image: ghcr.io/OWNER/REPO/app:latest
    command: ["tenderhub-worker"]
    environment:
      DATA_PATH: "/app/data/store.json"
      SECRET_KEY: "${SECRET_KEY}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
      WORKER_SYNC_MINUTES: "${WORKER_SYNC_MINUTES:-360}"
      WORKER_LOOP_SECONDS: "${WORKER_LOOP_SECONDS:-30}"
    volumes: ["./data:/app/data"]
    depends_on: [extractor]
    restart: unless-stopped

  extractor:
    image: ghcr.io/OWNER/REPO/extractor:latest
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports: ["8088:80"]
    volumes:
      - "./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on: [app]
    restart: unless-stopped
