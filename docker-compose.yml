services:
  app:
    build: { context: ., dockerfile: Dockerfile.app }
    environment:
      APP_ENV: "${APP_ENV:-development}"
      APP_ADDR: ":8080"
      DATA_PATH: "/app/data/store.db"
      SECRET_KEY: "${SECRET_KEY:-local-dev-secret-change-me}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      BOOTSTRAP_SYNC_ON_STARTUP: "${BOOTSTRAP_SYNC_ON_STARTUP:-true}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
    volumes: [ "./data:/app/data" ]
    depends_on:
      extractor:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  worker:
    build: { context: ., dockerfile: Dockerfile.app }
    command: [ "tenderhub-worker" ]
    environment:
      APP_ENV: "${APP_ENV:-development}"
      DATA_PATH: "/app/data/store.db"
      SECRET_KEY: "${SECRET_KEY:-local-dev-secret-change-me}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      BOOTSTRAP_SYNC_ON_STARTUP: "${BOOTSTRAP_SYNC_ON_STARTUP:-true}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
      WORKER_SYNC_MINUTES: "${WORKER_SYNC_MINUTES:-360}"
      WORKER_LOOP_SECONDS: "${WORKER_LOOP_SECONDS:-30}"
    volumes: [ "./data:/app/data" ]
    depends_on:
      extractor:
        condition: service_healthy
    restart: unless-stopped

  extractor:
    build: { context: ., dockerfile: Dockerfile.extractor }
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1:9090/healthz >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports: [ "8088:80" ]
    volumes: [ "./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro" ]
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
