name: openbid

services:
  app:
    init: true
    build: { context: ., dockerfile: Dockerfile.app }
    environment:
      APP_ENV: "${APP_ENV:-development}"
      APP_ADDR: ":8080"
      DATA_PATH: "/app/data/store.db"
      SECRET_KEY: "${SECRET_KEY:-local-dev-secret-change-me}"
      SECRET_KEY_FILE: "${SECRET_KEY_FILE:-}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      BOOTSTRAP_ADMIN_PASSWORD_FILE: "${BOOTSTRAP_ADMIN_PASSWORD_FILE:-}"
      BOOTSTRAP_SYNC_ON_STARTUP: "${BOOTSTRAP_SYNC_ON_STARTUP:-false}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
      BACKUP_DIR: "/app/backups"
    volumes:
      [
        "${OPENBID_DATA_DIR:-./data}:/app/data",
        "${OPENBID_BACKUPS_DIR:-./backups}:/app/backups",
        "${OPENBID_SECRETS_DIR:-./secrets}:/run/secrets:ro",
      ]
    tmpfs: ["/tmp"]
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      extractor:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    stop_grace_period: 20s

  worker:
    init: true
    build: { context: ., dockerfile: Dockerfile.app }
    command: ["openbid-worker"]
    environment:
      APP_ENV: "${APP_ENV:-development}"
      DATA_PATH: "/app/data/store.db"
      SECRET_KEY: "${SECRET_KEY:-local-dev-secret-change-me}"
      SECRET_KEY_FILE: "${SECRET_KEY_FILE:-}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
      LOW_MEMORY_MODE: "${LOW_MEMORY_MODE:-true}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-false}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:-}"
      BOOTSTRAP_ADMIN_PASSWORD_FILE: "${BOOTSTRAP_ADMIN_PASSWORD_FILE:-}"
      BOOTSTRAP_SYNC_ON_STARTUP: "${BOOTSTRAP_SYNC_ON_STARTUP:-false}"
      EXTRACTOR_URL: "http://extractor:9090"
      TREASURY_FEED_URL: "${TREASURY_FEED_URL:-}"
      WORKER_SYNC_MINUTES: "${WORKER_SYNC_MINUTES:-360}"
      WORKER_LOOP_SECONDS: "${WORKER_LOOP_SECONDS:-30}"
      BACKUP_DIR: "/app/backups"
    volumes:
      [
        "${OPENBID_DATA_DIR:-./data}:/app/data",
        "${OPENBID_BACKUPS_DIR:-./backups}:/app/backups",
        "${OPENBID_SECRETS_DIR:-./secrets}:/run/secrets:ro",
      ]
    tmpfs: ["/tmp"]
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      extractor:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "openbid-worker-health", "/tmp/openbid-worker-heartbeat", "180"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s

  extractor:
    init: true
    build: { context: ., dockerfile: Dockerfile.extractor }
    tmpfs: ["/tmp"]
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:9090/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 20s

  proxy:
    init: true
    image: nginx:1.27-alpine
    ports: ["${OPENBID_HTTP_PORT:-8088}:80"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro"]
    tmpfs: ["/var/cache/nginx", "/var/run", "/tmp"]
    read_only: true
    security_opt: ["no-new-privileges:true"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 15s
